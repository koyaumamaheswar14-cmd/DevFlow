server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/users/**

          - id: repo-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/repos/**

          - id: build-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/builds/**

          - id: deploy-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/deployments/**